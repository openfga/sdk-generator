name: Sync SDKs with generator

# Whenever changes that affect the generated SDKs land on main (templates,
# configs, build scripts, etc. — NOT workflow files), regenerate each SDK
# against its repo's main branch and open a PR in the SDK repo if the
# regenerated output differs, ensuring the SDKs never drift from the
# generator.

on:
  push:
    branches:
      - main
    paths:
      - "config/**"
      - "scripts/**"
      - "docker/**"
      - "Makefile"
  workflow_dispatch:
    inputs:
      sdk:
        description: "SDK to sync"
        type: choice
        default: all
        options:
          - all
          - js
          - go
          - dotnet
          - python
          - java

permissions:
  contents: read

concurrency:
  group: sync-sdks
  cancel-in-progress: true

env:
  SYNC_BRANCH: sync/sdk-generator
  PR_TITLE: "chore(sync): sync with generator"
  PR_LABEL: "sync-with-generator"

jobs:
  # Computes the SDK matrix. On push-to-main all SDKs are synced; on manual
  # dispatch the matrix is narrowed to the selected SDK (or all).
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Compute matrix
        id: set
        env:
          SELECTED: ${{ github.event_name == 'workflow_dispatch' && inputs.sdk || 'all' }}
        run: |
          ALL='[
            {"language":"js","repo":"js-sdk","make_target":"test-client-js"},
            {"language":"go","repo":"go-sdk","make_target":"test-client-go"},
            {"language":"dotnet","repo":"dotnet-sdk","make_target":"test-client-dotnet","openapi_generator_tag":"v7.11.0"},
            {"language":"python","repo":"python-sdk","make_target":"test-client-python"},
            {"language":"java","repo":"java-sdk","make_target":"test-client-java"}
          ]'

          if [[ "$SELECTED" == "all" ]]; then
            MATRIX=$(jq -c . <<<"$ALL")
          else
            MATRIX=$(jq -c --arg l "$SELECTED" '[ .[] | select(.language == $l) ]' <<<"$ALL")
          fi

          echo "Selected: $SELECTED"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  sync:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout sdk-generator
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      # The SDK repos are public, so no token is needed to clone them.
      # persist-credentials is disabled so the push step below can use a
      # freshly-minted app token instead of stale checkout credentials.
      - name: Checkout SDK repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          repository: ${{ github.repository_owner }}/${{ matrix.repo }}
          path: clients/fga-${{ matrix.language }}-sdk
          persist-credentials: false

      - name: Specify python version
        if: matrix.language == 'python'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"

      - name: Set up JDK
        if: matrix.language == 'java'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 11
          distribution: "temurin"
          cache: "gradle"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # Regenerates the SDK and runs its full test suite. If this step exits
      # non-zero (build or tests failed), the job stops here — no branch is
      # pushed and no PR is created/updated. A sync PR is only ever opened
      # from a passing build.
      - name: Regenerate and test SDK
        run: make ${{ matrix.make_target }}
        env:
          OPENAPI_GENERATOR_CLI_DOCKER_TAG: ${{ matrix.openapi_generator_tag || 'v6.4.0' }}

      - name: Check for SDK changes
        id: diff
        working-directory: clients/fga-${{ matrix.language }}-sdk
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "CLEAN: no changes found — SDK is in sync with the generator."
            echo "dirty=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "DIRTY: changes found"
          git status
          git --no-pager diff
          echo "dirty=true" >> "$GITHUB_OUTPUT"

      # Mint the token only once it's needed: app installation tokens expire
      # after 1 hour, and the build/test step above can run longer than that.
      - name: Generate token
        if: steps.diff.outputs.dirty == 'true'
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RELEASER_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ matrix.repo }}

      - name: Import GPG key
        if: steps.diff.outputs.dirty == 'true'
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          workdir: clients/fga-${{ matrix.language }}-sdk

      - name: Commit and push sync branch
        if: steps.diff.outputs.dirty == 'true'
        working-directory: clients/fga-${{ matrix.language }}-sdk
        env:
          PUSH_TOKEN: ${{ steps.app-token.outputs.token }}
          SDK_REPO: ${{ github.repository_owner }}/${{ matrix.repo }}
        run: |
          git config user.name openfga-releaser-bot
          git config user.email "${{ steps.import-gpg.outputs.email }}"

          git checkout -B "$SYNC_BRANCH"
          git add -A
          git commit -m "$PR_TITLE" \
            -m "Generated from ${{ github.repository }}@${{ github.sha }}"
          git push --force \
            "https://x-access-token:${PUSH_TOKEN}@github.com/${SDK_REPO}.git" \
            "$SYNC_BRANCH"

      - name: Create or update pull request
        if: steps.diff.outputs.dirty == 'true'
        working-directory: clients/fga-${{ matrix.language }}-sdk
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SDK_REPO: ${{ github.repository_owner }}/${{ matrix.repo }}
        run: |
          BODY="This PR syncs the SDK with the latest generator templates and configuration.

          Generated by [\`${{ github.repository }}@${GITHUB_SHA:0:7}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) via [this workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."

          EXISTING_PR=$(gh pr list \
            --repo "$SDK_REPO" \
            --head "$SYNC_BRANCH" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || true)

          if [[ -n "$EXISTING_PR" && "$EXISTING_PR" != "null" ]]; then
            echo "Updating existing sync PR #$EXISTING_PR"
            gh pr edit "$EXISTING_PR" \
              --repo "$SDK_REPO" \
              --title "$PR_TITLE" \
              --body "$BODY"

            # The branch was already force-pushed with the freshly regenerated
            # state; leave a comment so reviewers know the PR contents changed.
            gh pr comment "$EXISTING_PR" \
              --repo "$SDK_REPO" \
              --body "🔄 Updated with the latest regenerated output from [\`${{ github.repository }}@${GITHUB_SHA:0:7}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) ([workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})). Previous contents were replaced — please re-review."

            PR_NUMBER="$EXISTING_PR"
          else
            PR_URL=$(gh pr create \
              --repo "$SDK_REPO" \
              --head "$SYNC_BRANCH" \
              --base main \
              --title "$PR_TITLE" \
              --body "$BODY")
            PR_NUMBER="${PR_URL##*/}"
            echo "Created sync PR #$PR_NUMBER"
          fi

          # Tracking label (best-effort: don't fail the sync if the app lacks
          # label permissions on the SDK repo).
          gh label create "$PR_LABEL" \
            --repo "$SDK_REPO" \
            --color "0E8A16" \
            --description "Automated sync from openfga/sdk-generator" \
            --force 2>/dev/null || true
          gh pr edit "$PR_NUMBER" \
            --repo "$SDK_REPO" \
            --add-label "$PR_LABEL" 2>/dev/null || true

      - name: Summary
        if: always()
        run: |
          if [[ "${{ steps.diff.outputs.dirty }}" == "true" ]]; then
            echo "### \`${{ matrix.repo }}\`: drift detected — sync PR created/updated" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### \`${{ matrix.repo }}\`: in sync, nothing to do" >> "$GITHUB_STEP_SUMMARY"
          fi









