name: release-please

on:
  workflow_call:
    inputs:
      trigger-event:
        description: >
          The GitHub event that triggered the caller workflow (workflow_dispatch
          or push). Pass github.event_name from the caller. Used internally to
          distinguish manual dispatch from automated push-to-main runs.
        required: true
        type: string
      bump-type:
        description: >
          Version bump type. Select 'explicit' to supply an exact version via
          the 'release-version' field below. Select 'auto' to let
          conventional-commits determine the bump automatically.
        required: false
        type: string
        default: 'auto'
      release-version:
        description: >
          Explicit version to release (e.g. 1.2.3 or 1.4.0-beta.1).
        required: false
        type: string
        default: ''
    secrets:
      RELEASER_APP_CLIENT_ID:
        required: true
      RELEASER_APP_PRIVATE_KEY:
        required: true
      GPG_PRIVATE_KEY:
        required: true
      GPG_PASSPHRASE:
        required: false

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    # Callers are responsible for deciding when to invoke this workflow
    # (e.g. only on push when the merge commit title starts with "release").
    # This guard rejects any unexpected trigger-event values.
    if: inputs.trigger-event == 'workflow_dispatch' || inputs.trigger-event == 'push'

    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name:        ${{ steps.release.outputs.tag_name }}
      pr_number:       ${{ steps.release.outputs.pr_number }}

    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id:   ${{ secrets.RELEASER_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token:       ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          fetch-tags:  true

      # ── workflow_dispatch only: rebuild release branch from latest main ──
      - name: Prepare release branch
        if: inputs.trigger-event == 'workflow_dispatch'
        run: |
          git fetch origin main
          git checkout -B release origin/main
          git push origin release --force

      # Close any stale open release PRs before creating a new one.
      # These accumulate when previous runs fail or PRs get manually closed
      # without merging. Finding two merged PRs for the same version causes
      # release-please to try creating duplicate releases and fail.
      - name: Close stale release PRs
        if: inputs.trigger-event == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr list \
            --repo ${{ github.repository }} \
            --head "release-please--branches--release" \
            --state open \
            --json number \
            --jq '.[].number' \
          | xargs -r -I{} gh pr close {} \
              --repo ${{ github.repository }} \
              --comment "Superseded by new release workflow run — closing stale release PR."
          echo "Stale PR cleanup done."

          # Remove 'autorelease: pending' from merged PRs that were NOT merged
          # into main. These can accumulate when a release PR is merged into
          # the 'release' branch (or any other non-main branch) and would
          # otherwise cause release-please to attempt a duplicate release.
          gh pr list \
            --repo ${{ github.repository }} \
            --label "autorelease: pending" \
            --state merged \
            --json number,baseRefName \
            --jq '.[] | select(.baseRefName != "main") | .number' \
          | xargs -r -I{} gh pr edit {} \
              --repo ${{ github.repository }} \
              --remove-label "autorelease: pending"
          echo "Stale autorelease label cleanup done."

      - name: Compute release-as version
        id: compute-release-as
        if: inputs.trigger-event == 'workflow_dispatch'
        run: |
          BUMP="${{ inputs.bump-type }}"

          if [[ "$BUMP" == "patch" || "$BUMP" == "minor" || "$BUMP" == "major" ]]; then
            CURRENT=$(jq -r '.["."]' .release-please-manifest.json | cut -d'-' -f1)
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

            if   [[ "$BUMP" == "major" ]]; then NEXT="$((MAJOR + 1)).0.0"
            elif [[ "$BUMP" == "minor" ]]; then NEXT="${MAJOR}.$((MINOR + 1)).0"
            else                               NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
            fi

            echo "value=$NEXT" >> "$GITHUB_OUTPUT"
          else
            echo "value=" >> "$GITHUB_OUTPUT"
          fi

      - name: Import GPG key
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key:     ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase:          ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign:  true

      - name: Configure Git
        run: |
          git config user.name openfga-releaser-bot
          git config user.email ${{ steps.import-gpg.outputs.email }}
          git config tag.gpgSign true

      - name: Push Release-As commit
        if: >-
          inputs.trigger-event == 'workflow_dispatch' && (
            (inputs.bump-type == 'explicit' && inputs.release-version != '') ||
            inputs.bump-type == 'patch' ||
            inputs.bump-type == 'minor' ||
            inputs.bump-type == 'major'
          )
        run: |
          git checkout release

          if [[ "${{ inputs.bump-type }}" == "explicit" ]]; then
            VERSION="${{ inputs.release-version }}"
          else
            VERSION="${{ steps.compute-release-as.outputs.value }}"
          fi

          git commit --allow-empty \
            -m "chore: release ${VERSION}" \
            -m "Release-As: ${VERSION}"

          git push origin release

      # ── key fix: target-branch depends on what triggered the run ────────
      #
      #   workflow_dispatch  →  target release branch (build the PR)
      #   push to main       →  target main branch    (detect the merged PR
      #                         and emit release_created=true)
      - name: Resolve target branch
        id: target
        run: |
          if [[ "${{ inputs.trigger-event }}" == "workflow_dispatch" ]]; then
            echo "branch=release" >> "$GITHUB_OUTPUT"
          else
            echo "branch=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Run release-please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token:         ${{ steps.app-token.outputs.token }}
          config-file:   release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: ${{ steps.target.outputs.branch }}

      - name: Retarget release PR to main
        if: inputs.trigger-event == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PR=$(gh pr list \
            --repo ${{ github.repository }} \
            --head "release-please--branches--release" \
            --json number \
            --jq '.[0].number' 2>/dev/null || true)

          if [[ -z "$PR" || "$PR" == "null" ]]; then
            echo "No release PR found — nothing to retarget."
            exit 0
          fi

          echo "Retargeting PR #$PR base → main"
          gh api \
            repos/${{ github.repository }}/pulls/$PR \
            -X PATCH \
            -f base=main

          # Rename head branch from release-please--branches--release to
          # release-please--branches--main so the post-merge push-to-main
          # run can correlate the merge commit with this release PR.
          echo "Renaming head branch to release-please--branches--main"
          SHA=$(gh api repos/${{ github.repository }}/git/refs/heads/release-please--branches--release --jq '.object.sha')
          gh api \
            repos/${{ github.repository }}/git/refs/heads/release-please--branches--release \
            -X PATCH \
            -f ref="refs/heads/release-please--branches--main" \
            -f sha="$SHA"

          echo "Done. PR #$PR now targets main with correct head branch."

  # ── post-release: fires when the release PR is merged into main ──────────
  # release-please-config.json sets "skip-github-release": true, so the action
  # only lands the CHANGELOG/manifest bump. Here we create the GPG-signed tag
  # and a *draft* GitHub Release. The draft is undrafted by the SDK's own
  # publish workflow (triggered by the tag push) only after a successful
  # publish to the package registry, via the reusable undraft-release.yml.
  post-release:
    needs: release-please
    # The caller only invokes this workflow on push when the merge commit title
    # starts with "release:", so a manifest change is guaranteed here.
    if: inputs.trigger-event == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id:   ${{ secrets.RELEASER_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token:       ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Import GPG key
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key:     ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase:          ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign:  true

      - name: Configure Git
        run: |
          git config user.name openfga-releaser-bot
          git config user.email ${{ steps.import-gpg.outputs.email }}
          git config tag.gpgSign true

      - name: Detect released package from manifest diff
        id: parse-release
        run: |
          MANIFEST=".release-please-manifest.json"
          PREV_MANIFEST="$(mktemp)"

          # Snapshot the previous manifest so the parse script can read it as a
          # plain file (no shell-escaping concerns).
          git show "HEAD~1:$MANIFEST" >"$PREV_MANIFEST"

          RELEASES=$(bash .github/workflows/scripts/parse-release.sh \
            manifest-diff "$MANIFEST" "$PREV_MANIFEST")

          echo "Detected releases:"
          jq -r '.[] | "  - \(.tag_name)"' <<<"$RELEASES"

          echo "releases=$RELEASES" >>"$GITHUB_OUTPUT"

      - name: Create signed tag and draft GitHub release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO:     ${{ github.repository }}
        run: |
          RELEASES='${{ steps.parse-release.outputs.releases }}'

          echo "$RELEASES" | jq -c '.[]' | while read -r ENTRY; do
            PKG=$(jq -r '.component'     <<<"$ENTRY")
            VERSION=$(jq -r '.version'   <<<"$ENTRY")
            TAG_NAME=$(jq -r '.tag_name' <<<"$ENTRY")

            echo "::group::$TAG_NAME"

            # Single-package SDKs use the root component "." (CHANGELOG.md and
            # tags live at the repo root). The non-root branch keeps the script
            # forward-compatible with monorepo-style manifests.
            if [[ "$PKG" == "." ]]; then
              CHANGELOG="CHANGELOG.md"
              TAG_GLOB="v*"
            else
              CHANGELOG="${PKG}/CHANGELOG.md"
              TAG_GLOB="${PKG}/v*"
            fi

            # Extract release notes for this version from the CHANGELOG.
            # Logic lives in scripts/parse-release.sh (unit-tested).
            NOTES=$(bash .github/workflows/scripts/parse-release.sh \
              changelog-notes "$CHANGELOG" "$VERSION")

            # Create the GPG-signed tag (skip if it already exists) and push it.
            # The push triggers the SDK's publish workflow.
            if git rev-parse "refs/tags/$TAG_NAME" >/dev/null 2>&1; then
              echo "Tag $TAG_NAME already exists — skipping tag creation."
            else
              git tag -s "$TAG_NAME" -m "Release ${TAG_NAME}"
              git push origin "$TAG_NAME"
            fi

            # Find the previous tag so the auto-generated notes only cover
            # commits since the last release.
            git fetch --tags --quiet origin || true
            PREV_TAG=$(git tag --list "$TAG_GLOB" --sort=-v:refname \
              | grep -vFx "$TAG_NAME" \
              | head -n1 || true)

            echo "Previous tag: ${PREV_TAG:-<none>}"

            # Build the JSON payload for the generate-notes API. Omit
            # previous_tag_name when no prior tag exists — GitHub will then
            # auto-detect a sensible baseline.
            GEN_PAYLOAD=$(jq -nc \
              --arg tag "$TAG_NAME" \
              --arg target "main" \
              --arg prev "$PREV_TAG" \
              '{tag_name: $tag, target_commitish: $target}
                + (if $prev != "" then {previous_tag_name: $prev} else {} end)')

            AUTO_NOTES=$(gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              "repos/${REPO}/releases/generate-notes" \
              --input - <<<"$GEN_PAYLOAD" \
              --jq '.body' 2>/dev/null || true)

            if [[ -n "$AUTO_NOTES" ]]; then
              NOTES=$(printf '%s\n\n%s\n' "$NOTES" "$AUTO_NOTES")
            else
              echo "::warning::No auto-generated notes returned for $TAG_NAME — using changelog notes only."
            fi

            # Mark anything with a pre-release suffix (e.g. -beta.1) as a pre-release.
            PRERELEASE_FLAG=()
            if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              PRERELEASE_FLAG=(--prerelease)
            fi

            # Create the GitHub release as a draft. It is undrafted by the SDK's
            # publish workflow only after a successful publish.
            if gh release view "$TAG_NAME" --repo "$REPO" >/dev/null 2>&1; then
              echo "Release $TAG_NAME already exists — updating notes."
              gh release edit "$TAG_NAME" \
                --repo "$REPO" \
                --title "$TAG_NAME" \
                --notes "$NOTES" \
                --draft "${PRERELEASE_FLAG[@]}"
            else
              gh release create "$TAG_NAME" \
                --repo "$REPO" \
                --title "$TAG_NAME" \
                --notes "$NOTES" \
                --draft "${PRERELEASE_FLAG[@]}"
            fi

            echo "::endgroup::"
          done

      # Reset release branch to match main so the next cycle starts clean
      - name: Sync release branch to main
        run: |
          git fetch origin main
          git checkout release 2>/dev/null || git checkout -b release
          git reset --hard origin/main
          git push origin release --force

      - name: Post-release summary
        run: |
          RELEASES='${{ steps.parse-release.outputs.releases }}'
          echo "### Releases drafted" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "$RELEASES" | jq -r '.[] | "- `\(.tag_name)` — signed tag pushed, draft release created"' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The publish workflow will undraft each release after a successful publish to the package registry." >> "$GITHUB_STEP_SUMMARY"
          echo "\`release\` branch has been reset to \`main\` for the next cycle." >> "$GITHUB_STEP_SUMMARY"
